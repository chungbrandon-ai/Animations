<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Durkheim: Mechanical vs Organic Solidarity</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400&display=swap');

        :root {
            --bg-color: #1c1c1c;
            --text-color: #e0e0e0;
            --blue-accent: #88ddff;
            --brown-accent: #c6a482;
            --green-accent: #88ff88;
            --cream: #fdf6e3;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Crimson Pro', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 40px;
        }

        #container {
            position: relative;
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        canvas {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            background: rgba(255,255,255,0.02);
        }

        #ui-panel {
            margin-top: 15px;
            text-align: center;
            max-width: 700px;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #title {
            font-size: 2rem;
            color: var(--brown-accent);
            margin-bottom: 5px;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        #description {
            font-size: 1.05rem;
            line-height: 1.5;
            min-height: 60px;
            color: var(--text-color);
            opacity: 0;
            transition: opacity 0.8s ease;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 25px;
            background-color: transparent;
            border: 2px solid var(--blue-accent);
            color: var(--blue-accent);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            min-width: 140px;
        }

        .btn:hover {
            background-color: var(--blue-accent);
            color: var(--bg-color);
            box-shadow: 0 0 15px var(--blue-accent);
        }

        .btn:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
            box-shadow: none;
        }

        #info-card {
            display: none;
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 10px;
            border-left: 4px solid var(--brown-accent);
            text-align: left;
            margin-top: 15px;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <canvas id="mainCanvas"></canvas>
        
        <div id="ui-panel">
            <div id="title">Emile Durkheim</div>
            <div id="description">
                In sociologic study, solidarity refers to the glue that holds a society together.
            </div>
            
            <div class="controls">
                <button class="btn" id="prevBtn" onclick="prevStage()" disabled>Back</button>
                <button class="btn" id="nextBtn" onclick="nextStage()">Start Learning</button>
            </div>
            
            <div id="info-card"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('mainCanvas');
        const ctx = canvas.getContext('2d');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const titleEl = document.getElementById('title');
        const descEl = document.getElementById('description');
        const infoCard = document.getElementById('info-card');

        let width, height;
        let stage = 0;
        let particles = [];
        let time = 0;

        function initCanvas() {
            width = canvas.width = canvas.offsetWidth * 2;
            height = canvas.height = canvas.offsetHeight * 2;
            ctx.scale(2, 2);
            width /= 2;
            height /= 2;
        }

        class Particle {
            constructor(x, y, color = '#88ddff', shape = 'circle') {
                this.originX = x;
                this.originY = y;
                this.x = x;
                this.y = y;
                this.size = 6;
                this.color = color;
                this.shape = shape;
                this.targetX = x;
                this.targetY = y;
            }

            draw(ctx) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.shape === 'circle') {
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                } else if (this.shape === 'square') {
                    ctx.rect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
                } else if (this.shape === 'triangle') {
                    ctx.moveTo(this.x, this.y - this.size);
                    ctx.lineTo(this.x + this.size, this.y + this.size);
                    ctx.lineTo(this.x - this.size, this.y + this.size);
                }
                ctx.closePath();
                ctx.fill();
            }

            update() {
                this.x += (this.targetX - this.x) * 0.05;
                this.y += (this.targetY - this.y) * 0.05;
                this.x += Math.sin(time * 0.02 + this.originX) * 0.2;
                this.y += Math.cos(time * 0.02 + this.originY) * 0.2;
            }
        }

        const stages = [
            {
                title: "Introduction",
                desc: "Sociology is the study of 'Social Facts'—the external forces that shape our behaviors and beliefs.",
                setup: () => {
                    particles.forEach(p => {
                        p.targetX = width/2 + (Math.random()-0.5)*450;
                        p.targetY = height/2 + (Math.random()-0.5)*250;
                        p.color = '#88ddff';
                        p.shape = 'circle';
                    });
                }
            },
            {
                title: "Mechanical Solidarity",
                desc: "In traditional societies, cohesion comes from homogeneity. Everyone shares similar roles and a robust 'Collective Conscience'.",
                setup: () => {
                    const rows = 5;
                    const cols = 10;
                    const spacingX = 60;
                    const spacingY = 50;
                    const offsetX = (width - (cols-1)*spacingX) / 2;
                    const offsetY = (height - (rows-1)*spacingY) / 2;
                    
                    particles.forEach((p, i) => {
                        const r = Math.floor(i / cols) % rows;
                        const c = i % cols;
                        p.targetX = offsetX + c * spacingX;
                        p.targetY = offsetY + r * spacingY;
                        p.color = '#88ddff';
                        p.shape = 'circle';
                    });
                }
            },
            {
                title: "Organic Solidarity",
                desc: "Modern societies rely on the 'Division of Labor'. Specialized individuals are interdependent, creating a web of mutual need.",
                setup: () => {
                    const colors = ['#ff8888', '#88ff88', '#ffff88', '#88ddff', '#c6a482'];
                    const shapes = ['circle', 'square', 'triangle'];
                    
                    particles.forEach((p, i) => {
                        p.targetX = width/2 + (Math.random()-0.5)*550;
                        p.targetY = height/2 + (Math.random()-0.5)*250;
                        p.color = colors[i % colors.length];
                        p.shape = shapes[i % shapes.length];
                    });
                }
            },
            {
                title: "Emile Durkheim (1858–1917)",
                desc: "Established sociology as a science, arguing that society is an objective 'Social Fact' that exists independently of individuals.",
                setup: () => {
                    particles.forEach((p, i) => {
                        const angle = (i / particles.length) * Math.PI * 2;
                        const radius = 100 + Math.sin(angle * 3) * 15;
                        p.targetX = width/2 + Math.cos(angle) * radius;
                        p.targetY = height/2 + Math.sin(angle) * radius;
                        p.color = '#c6a482';
                        p.shape = 'circle';
                    });
                }
            }
        ];

        function updateUI() {
            titleEl.style.opacity = 0;
            descEl.style.opacity = 0;
            infoCard.style.display = 'none';
            descEl.style.display = 'block';
            nextBtn.style.display = 'inline-block';

            setTimeout(() => {
                const s = stages[stage];
                titleEl.innerText = s.title;
                descEl.innerText = s.desc;
                s.setup();
                titleEl.style.opacity = 1;
                descEl.style.opacity = 1;
                
                prevBtn.disabled = (stage === 0);
                
                if (stage === stages.length - 1) {
                    nextBtn.innerText = "Learn Bio";
                } else {
                    nextBtn.innerText = stage === 0 ? "Start Learning" : "Next Step";
                }
            }, 400);
        }

        function nextStage() {
            if (stage < stages.length - 1) {
                stage++;
                updateUI();
            } else {
                showFinalInfo();
            }
        }

        function prevStage() {
            if (stage > 0) {
                stage--;
                updateUI();
            }
        }

        function showFinalInfo() {
            nextBtn.style.display = 'none';
            descEl.style.display = 'none';
            infoCard.style.display = 'block';
            infoCard.innerHTML = `
                <h3 style="color:var(--brown-accent); margin-top:0;">Founder of Modern Sociology</h3>
                <p>Durkheim founded the first European department of sociology (1895) and the journal <i>L'Année Sociologique</i>.</p>
                <p><b>Major Concepts:</b> Repressive vs Restitutive Law, Anomie, and the analysis of Suicide as a social phenomenon.</p>
                <p style="font-size:0.9rem; opacity:0.7;">Legacy: Moved social theory from philosophy to empirical science.</p>
            `;
        }

        function drawConnections() {
            if (stage < 2) return; 
            ctx.lineWidth = 0.5;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dist = Math.hypot(particles[i].x - particles[j].x, particles[i].y - particles[j].y);
                    if (dist < 95) {
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = '#1c1c1c';
            ctx.fillRect(0, 0, width, height);
            time++;
            drawConnections();
            particles.forEach(p => { p.update(); p.draw(ctx); });
            requestAnimationFrame(animate);
        }

        window.onload = () => {
            initCanvas();
            for(let i = 0; i < 50; i++) {
                particles.push(new Particle(width/2, height/2));
            }
            stages[0].setup();
            titleEl.innerText = stages[0].title;
            descEl.innerText = stages[0].desc;
            titleEl.style.opacity = 1;
            descEl.style.opacity = 1;
            animate();
        };

        window.onresize = initCanvas;
    </script>
</body>
</html>
